name: Build wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
    tags: ["*.*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build ${{ matrix.arch }} wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: "x86_64"
          - os: ubuntu-24.04-arm
            arch: "aarch64"
          - os: macos-14
            arch: "universal2"
          - os: windows-2022
            arch: "AMD64"
          - os: windows-11-arm
            arch: "ARM64"

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: "${{ matrix.arch }}"
          CIBW_BUILD: "cp39-*"

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: pyodide/setup-emsdk@v15
        with:
          version: 5.0.3

      - name: Build WASM
        run: bash wasm/build.sh

      - name: Test WASM (ESM)
        run: node wasm/test_wasm.mjs

      - name: Test WASM (CJS)
        run: node wasm/test_wasm.cjs

      - uses: actions/upload-artifact@v6
        with:
          name: wasm
          path: |
            wasm/dist/gifsicle.js
            wasm/dist/gifsicle.wasm

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist, build_wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/gifsicle-bin
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: "wheels-*"
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    needs: [build_wheels, build_sdist, build_wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: wasm
          path: wasm-dist

      - name: Create release with WASM assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wasm-dist/gifsicle.js
            wasm-dist/gifsicle.wasm

  publish_npm:
    name: Publish to npm
    needs: [build_wasm]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment:
      name: npm
      url: https://www.npmjs.com/package/gifsicle-wasm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: wasm
          path: wasm/dist

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: wasm
